name: Deploy Wiki to arselectronic.ru/wiki

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install & Build
        run: |
          npm ci
          # Сборка с учетом baseUrl: "/wiki/" из docusaurus.config.ts
          npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync to VPS
        run: |
          # Создаем директорию на сервере
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.REMOTE_HOST }} "mkdir -p ~/ars-wiki-static"

          # Заливаем только содержимое папки build
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./build/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.REMOTE_HOST }}:~/ars-wiki-static/

      - name: Verify Nginx (Optional)
        run: |
          # Проверка конфига Nginx после деплоя (по желанию)
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.REMOTE_HOST }} "sudo nginx -t"
